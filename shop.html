<!-- ── HEADER ── -->

        <li><a href="index.html#contact" data-i18n="nav_contact"></a></li>

  <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close menu">

<!-- ── SHOP HERO ── -->

    <h1 data-i18n="shop_title"></h1>
    <p data-i18n="shop_sub_full"></p>

</section>

<!-- ── SHOP LAYOUT ── -->
<div class="container">
  <div class="shop-layout">

    <!-- Sidebar -->
    <aside class="shop-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title" id="sb-cat-title">Kategori / Category</div>
        <div class="sidebar-cats">
          <button class="cat-btn active" data-cat="all" onclick="setFilter('all')">
            <span data-i18n="filter_all"></span>
            <span class="cat-count" id="count-all">8</span>
          </button>
          <button class="cat-btn" data-cat="amigurumi" onclick="setFilter('amigurumi')">
            <span data-i18n="filter_amigurumi"></span>
            <span class="cat-count" id="count-amigurumi">5</span>
          </button>
          <button class="cat-btn" data-cat="bag" onclick="setFilter('bag')">
            <span data-i18n="filter_bag"></span>
            <span class="cat-count" id="count-bag">1</span>
          </button>
          <button class="cat-btn" data-cat="decor" onclick="setFilter('decor')">
            <span data-i18n="filter_decor"></span>
            <span class="cat-count" id="count-decor">1</span>
          </button>
          <button class="cat-btn" data-cat="accessory" onclick="setFilter('accessory')">

            <span class="cat-count" id="count-accessory">1</span>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Fiyat / Price (₺)</div>
        <div class="price-inputs">
          <input type="number" placeholder="Min" min="0" id="price-min" />
          <span class="price-sep">—</span>
          <input type="number" placeholder="Max" min="0" id="price-max" />
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Sırala / Sort</div>
        <select class="sort-select" id="sort-select" onchange="sortProducts()">
          <option value="default">Varsayılan / Default</option>
          <option value="price-asc">Fiyat ↑ / Price ↑</option>
          <option value="price-desc">Fiyat ↓ / Price ↓</option>
          <option value="name">A → Z</option>
        </select>
      </div>

      <div class="sidebar-etsy-block">
        <p id="sb-etsy-text">Daha fazla ürün için Etsy mağazamı ziyaret edin.</p>
        <a href="https://aselovers.etsy.com/" target="_blank" data-i18n="nav_etsy"></a>
      </div>
    </aside>

    <!-- Main -->
    <div>

        <div class="results-count" id="results-count"></div>

          </button>
        </div>
      </div>

      <div class="shop-product-grid" id="shop-product-grid"></div>

      <div style="text-align:center;margin-top:56px">
        <a href="https://aselovers.etsy.com/" target="_blank" class="load-more-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M11.956 0C5.354 0 0 5.354 0 11.956c0 6.603 5.354 11.957 11.956 11.957s11.957-5.354 11.957-11.957C23.913 5.354 18.559 0 11.956 0zm4.47 16.364c-.293.098-.88.196-1.37.196-2.054 0-2.544-1.174-2.544-2.935V9.89h-1.076v-1.37h1.076V6.647l1.86-.587v2.46h1.76v1.37h-1.76v3.54c0 .783.294 1.076.88 1.076.196 0 .49-.098.783-.195l.39 1.053z"/></svg>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

    <h3 id="cart-title" data-i18n="cart_title"></h3>
    <button class="cart-close" onclick="closeCart()" aria-label="Close cart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

  <div class="cart-footer">

</button>

<script src="main.js"></script>
<script>
  /* ── Shop page extras ── */
  let currentView = 'grid';

  /* Add shop translations */
  if (translations.tr) {
    translations.tr.shop_sub_full = 'Her parça, her dikişte özenle hazırlandı.';
  }
  if (translations.en) {
    translations.en.shop_sub_full = 'Every piece, prepared with care in every stitch.';
  }

  function setView(view) {
    currentView = view;
    const grid = document.getElementById('shop-product-grid');
    if (!grid) return;
    grid.classList.toggle('list-view', view === 'list');
    document.getElementById('grid-btn').classList.toggle('active', view === 'grid');
    document.getElementById('list-btn').classList.toggle('active', view === 'list');
  }

  function sortProducts() {
    renderShopProducts(activeFilter, document.getElementById('sort-select').value);
  }

  function renderShopProducts(filter, sort = 'default') {
    const grid = document.getElementById('shop-product-grid');
    const countEl = document.getElementById('results-count');
    if (!grid) return;

    let list = filter === 'all'
      ? [...allProducts]
      : allProducts.filter(p => p.category === filter);

    /* Price filter */
    const min = Number(document.getElementById('price-min')?.value) || 0;
    const maxVal = document.getElementById('price-max')?.value;
    const max = maxVal ? Number(maxVal) : Infinity;
    list = list.filter(p => Number(p.price) >= min && Number(p.price) <= max);

    /* Sort */
    if (sort === 'price-asc')  list.sort((a,b) => a.price - b.price);
    if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
    if (sort === 'name') {
      list.sort((a,b) => {
        const an = currentLang === 'tr' ? (a.title_tr || a.title_en) : (a.title_en || a.title_tr);
        const bn = currentLang === 'tr' ? (b.title_tr || b.title_en) : (b.title_en || b.title_tr);
        return an.localeCompare(bn);
      });
    }

    if (countEl) {
      countEl.innerHTML = `<strong>${list.length}</strong> ${currentLang === 'tr' ? 'ürün' : 'products'}`;
    }

    /* Update category counts */
    ['all','amigurumi','bag','decor','accessory'].forEach(cat => {
      const el = document.getElementById('count-' + cat);
      if (!el) return;
      const n = cat === 'all' ? allProducts.length : allProducts.filter(p => p.category === cat).length;
      el.textContent = n;
    });

    if (list.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--mid)">
        <p>${currentLang === 'tr' ? 'Bu kategoride ürün yok.' : 'No products in this category.'}</p>
      </div>`;
      return;
    }

    grid.innerHTML = list.map(p => {
      const name  = currentLang === 'tr' ? (p.title_tr || p.title_en) : (p.title_en || p.title_tr);
      const desc  = currentLang === 'tr' ? (p.description_tr || p.description_en) : (p.description_en || p.description_tr);
      const catLabel = t('cat_' + p.category) || p.category;
      const badge = p.isNew
        ? `<span class="product-badge badge-new">${currentLang === 'tr' ? 'Yeni' : 'New'}</span>`
        : '';
      const imgHtml = p.image
        ? `<img src="${p.image}" alt="${name}" loading="lazy" />`
        : `<div class="product-img-placeholder">
             <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8"><circle cx="12" cy="12" r="10"/><path d="M8 12a4 4 0 0 1 8 0"/></svg>
           </div>`;
      const priceStr = p.currency === 'TRY'
        ? `${Number(p.price).toLocaleString('tr-TR')} ₺`
        : `${p.price} ${p.currency}`;
      return `
      <div class="product-card fade-up" data-id="${p.id}">
        <div class="product-img">
          ${imgHtml}${badge}
          <button class="product-wishlist" aria-label="Wishlist">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
        <div class="product-info">
          <div class="product-cat">${catLabel}</div>
          <h3 class="product-name">${name}</h3>
          <p class="product-desc">${desc}</p>
          <div class="product-footer">
            <div class="product-price">${priceStr}</div>
            <button class="add-to-cart" onclick="addToCart('${p.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              ${t('add_to_cart')}
            </button>
          </div>
          <a href="${p.url}" target="_blank" class="btn-ghost" style="margin-top:10px;display:inline-flex">${t('view_on_etsy')}</a>
        </div>
      </div>`;
    }).join('');

    /* Sync sidebar cat buttons */
    document.querySelectorAll('.cat-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.cat === filter)
    );
    observeFadeElements();
  }

  /* Override global renderProducts for shop page */
  const _origRenderProducts = window.renderProducts;
  window.renderProducts = function(filter) {
    if (filter !== undefined) activeFilter = filter;
    renderShopProducts(activeFilter, document.getElementById('sort-select')?.value || 'default');
  };

  /* URL param handling & setup */
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat');
    if (cat) activeFilter = cat;

    /* Update Etsy sidebar text per lang */
    const sbText = document.getElementById('sb-etsy-text');
    if (sbText) {
      sbText.textContent = currentLang === 'tr'
        ? 'Daha fazla ürün için Etsy mağazamı ziyaret edin.'
        : 'Visit my Etsy store for even more products.';
    }
    const etsyMoreBtn = document.getElementById('etsy-more-btn');
    if (etsyMoreBtn) {
      etsyMoreBtn.textContent = currentLang === 'tr'
        ? "Etsy'de Daha Fazlasını Gör"
        : 'See More on Etsy';
    }

    ['price-min','price-max'].forEach(id => {
      document.getElementById(id)?.addEventListener('change', () =>
        renderShopProducts(activeFilter, document.getElementById('sort-select')?.value || 'default')
      );
    });
  });
</script>
</body>
