name: Publish scheduled blog posts

on:
  schedule:
    - cron: '17 6 * * *'   # every day at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Flip due posts live
        run: npm run blog-publish
      - name: Commit if a post went live
        run: |
          git add src/data/blog.json
          if git diff --cached --quiet; then
            echo "No post due today — nothing to commit."
          else
            git config user.name "aselovers-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(blog): auto-publish scheduled post [automated]"
            git push
          fi
