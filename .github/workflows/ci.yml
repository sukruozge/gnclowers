name: CI

# Test + build gate. Runs on every push and PR to main so a red suite or broken
# build is visible before it compounds. Advisory: Cloudflare Pages builds
# independently — enable branch protection on this check to make it blocking.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
